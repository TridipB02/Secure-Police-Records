spring:
  application:
    name: secure-police-record

  datasource:
    url: jdbc:postgresql://localhost:5432/police_records
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  public-url: http://localhost:8080

jwt:
  secret: ${JWT_SECRET}

fabric:
  wallet-path: /path/to/fabric-wallet
  network-config-path: /path/to/connection-profile.yaml
  channel-name: policechannel
  chaincode-name: policerecord
  msp-id: Org1MSP
  
crypto:
  aes-secret: ${AES_SECRET}
  aes-salt: ${AES_SALT}

logging:
  level:
    com.secure.policerecord: DEBUG
    org.springframework.security: DEBUG